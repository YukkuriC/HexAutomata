- name: EnablesFocusInHands
  type: boolean
  default: 'true'
  category: Scope
  descrip: Reactive Focus(es) inside player's hands take effect; ignored if `Inventory` set to true
  side: common
- name: EnablesFocusInsideInventory
  type: boolean
  default: 'false'
  category: Scope
  descrip: Reactive Focus(es) inside player's inventory (including main/off hand) take effect
  side: common
- name: EnablesFocusInsideEnderChest
  type: boolean
  default: 'false'
  category: Scope
  descrip: Reactive Focus(es) inside player's ender chest take effect
  side: common
- name: EnablesFocusInsideAccessories
  type: boolean
  default: 'true'
  category: Scope
  descrip: Reactive Focus(es) inside player's curios/trinkets slots take effect
  side: common
- name: FirstFocusOnly
  type: boolean
  default: 'true'
  category: Scope
  descrip: Only the first Reactive Focus of a type met take effect; if set to false, all Focuses of certain type are triggered for each event (may cause performance impact)
  side: common
- name: MaxRecursiveEventsPerTick
  type: int
  default: 10, 0, 114514
  category: Execute
  descrip: Recursive triggered events in a tick deeper than this value will be rejected (e.g. teleport self inside `Teleported` focus)
  side: common
